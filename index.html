<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Candeliance‑EPA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* COULEURS DU LOGO */
:root {
    --blue: #5BA6C7;
    --yellow: #E8B33A;
    --dark: #333;
    --light: #f9f9f9;
}

/* GLOBAL */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    color: var(--dark);
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 25px 40px;
    border-bottom: 1px solid #eee;
    align-items: center;
}

.logo {
    font-weight: bold;
    color: var(--blue);
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: var(--dark);
    font-weight: 500;
}

nav a:hover {
    color: var(--blue);
}

/* HERO */
.hero {
    text-align: center;
    padding: 140px 20px;
    background: linear-gradient(to right, var(--blue), #3a8ca9);
    color: white;
}

.hero h1 {
    font-size: 2.6rem;
    margin-bottom: 20px;
}

.hero p {
    font-size: 1.2rem;
    opacity: 0.9;
}

/* SECTIONS */
.section {
    max-width: 1100px;
    margin: auto;
    padding: 80px 20px;
}

/* TITRES */
h2 {
    text-align: center;
    margin-bottom: 40px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 40px;
}
