<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Candeliance‑EPA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root {
    --blue: #5BA6C7;
    --yellow: #E8B33A;
    --dark: #333;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 25px 40px;
    border-bottom: 1px solid #eee;
}

.logo {
    color: var(--blue);
    font-weight: bold;
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: var(--dark);
}

/* HERO */
.hero {
    text-align: center;
    padding: 120px 20px;
    background: linear-gradient(to right, var(--blue), #3a8ca9);
    color: white;
}

/* SECTION */
.section {
    max-width: 1100px;
    margin: auto;
    padding: 60px 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 40px;
}

/* CARD */
.card {
    border: 1px solid #eee;
    padding: 25px;
    border-radius: 10px;
}

</style>

</head>

<body>

<header>
    <div class="logo">Candeliance‑EPA</div>
    <nav>
        <a href="#">Accueil</a>
        <a href="#">Expertises</a>
        <a href="#">Partenaires</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Éclairage public & aménagement urbain</h1>
