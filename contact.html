<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Contact - Candeliance EPA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="Candeliance">
    </div>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Contact</h1>
    <p>Parlons de votre projet d’éclairage et d’aménagement</p>
</section>

<section class="section">

    <div class="contact-container">

        <!-- INFOS -->
        <div class="contact-info">
            <h3>Coordonnées</h3>

            <p><strong>Email :</strong><br>
                <a href="mailto:coquel.fabien@candeliance-epa.fr">
                    coquel.fabien@candeliance-epa.fr
                </a>
            </p>

            <p><strong>Téléphone :</strong><br>
                <a href="tel:0637308868">
                    06 37 30 88 68
                </a>
            </p>

            <p>
                Réponse rapide sous 24h
            </p>
        </div>

        <!-- FORMULAIRE -->
        <form class="contact-form">

            <h3>Votre message</h3>

            <input type="text" name="name" placeholder="Nom" required>

            <input type="email" name="email" placeholder="Email" required>

            <textarea name="message" placeholder="Votre message..." rows="5" required></textarea>

            <button type="submit">Envoyer le message</button>

        </form>

    </div>

</section>

<footer>
    © Candeliance‑EPA
</footer>

<!-- ✅ EMAILJS SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>

<script>
window.addEventListener("load", function () {

    emailjs.init("-gXcBeTj9jMUzvS4");

    document.querySelector(".contact-form").addEventListener("submit", function(e) {
        e.preventDefault();

        emailjs.sendForm(
            "service_8pmfnjd",
            "template_ncq295j",
            this
        )
        .then(function() {
            alert("Message envoyé ✅");
        }, function(error) {
            alert("Erreur ❌");
            console.log(error);
        });
    });

});
</script>

</body>
</html>
